<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가발 착용 전·후 — BNH</title><style>
:root{--bg:#faf9f6;--surface:#fff;--border:#e8e6df;--text:#2c2c2a;--text-muted:#75736c;--accent:#d4537e;--after:#1d9e75;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:32px 20px 64px;}
.wrap{max-width:1000px;margin:0 auto;} h1{font-size:23px;font-weight:600;letter-spacing:-0.3px;} .sub{color:var(--text-muted);font-size:14px;margin-top:4px;}
.row{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-top:20px;}
.rowhead{display:flex;align-items:baseline;gap:8px;margin-bottom:12px;} .mname{font-size:16px;font-weight:700;} .mmeta{font-size:13px;color:var(--text-muted);}
.pair{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;}
@media(max-width:560px){.pair{grid-template-columns:1fr;}.arrow{transform:rotate(90deg);}}
figure{margin:0;} .ph{position:relative;border-radius:12px;overflow:hidden;border:1px solid var(--border);} .ph.after{border:2px solid var(--after);}
.ph img{width:100%;display:block;aspect-ratio:3/4;object-fit:cover;cursor:zoom-in;}
.bw,.aw{position:absolute;top:10px;left:10px;font-size:11px;font-weight:700;color:#fff;padding:3px 10px;border-radius:12px;letter-spacing:.5px;}
.bw{background:#75736c;} .aw{background:var(--after);}
figcaption{text-align:center;font-size:13px;font-weight:600;margin-top:8px;} figcaption small{font-weight:400;color:var(--text-muted);font-size:11.5px;}
.arrow{font-size:26px;color:var(--accent);font-weight:700;}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;align-items:center;justify-content:center;padding:32px;cursor:zoom-out;}
.lightbox.open{display:flex;} .lightbox img{max-width:100%;max-height:92vh;border-radius:8px;}

  .nav{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
  .nav a{font-size:13px;font-weight:600;text-decoration:none;color:var(--text-muted);padding:7px 14px;border:1px solid var(--border);border-radius:999px;background:var(--surface);}
  .nav a:hover{border-color:var(--border-hover);color:var(--text);}
  .nav a.active{background:var(--accent);color:#fff;border-color:var(--accent);}
</style></head><body>
<div class="wrap">
  <nav class="nav"><a href="models.html">최종 모델</a><a href="before-after.html" class="active">전·후 비교</a><a href="index.html">선정 투표</a></nav>

    <div class="row">

      <div class="pair">
        <figure><div class="ph"><span class="bw">BEFORE</span><img loading="lazy" src="img/ba_B_before.webp" onclick="zoom(this.src)"></div><figcaption>전 · 가발 미착용<br><small>정수리 모량 부족 · 가르마 비침</small></figcaption></figure>

      </div>
    </div>

        <div class="arrow">→</div>
        <figure><div class="ph after"><span class="aw">AFTER</span><img loading="lazy" src="img/ba_M1_after.webp" onclick="zoom(this.src)"></div><figcaption>후 · 가발 착용<br><small>정수리 볼륨 · 가르마 커버</small></figcaption></figure>
      </div>
    </div>
    <div class="row">
      <div class="rowhead"><span class="mname">M5 · 동안·화사·생기</span><span class="mmeta">· 40대 초반</span></div>
      <div class="pair">
        <figure><div class="ph"><span class="bw">BEFORE</span><img loading="lazy" src="img/ba_M5_before.webp" onclick="zoom(this.src)"></div><figcaption>전 · 가발 미착용<br><small>정수리 모량 부족 · 가르마 비침</small></figcaption></figure>
        <div class="arrow">→</div>
        <figure><div class="ph after"><span class="aw">AFTER</span><img loading="lazy" src="img/ba_M5_after.webp" onclick="zoom(this.src)"></div><figcaption>후 · 가발 착용<br><small>정수리 볼륨 · 가르마 커버</small></figcaption></figure>
      </div>
    </div>
</div>
<div class="lightbox" id="lb" onclick="this.classList.remove('open')"><img id="lbimg"></div>
<script>function zoom(s){document.getElementById('lbimg').src=s;document.getElementById('lb').classList.add('open');}</script>
</body></html>
