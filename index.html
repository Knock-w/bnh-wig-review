<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가발 AI 모델 리뷰 (실시간) — BNH</title>
<style>
  :root {
    --bg: #faf9f6; --surface: #ffffff; --border: #e8e6df; --border-hover: #cfccc2;
    --text: #2c2c2a; --text-muted: #75736c; --accent: #d4537e; --accent-bg: #fbeaf0; --info: #185fa5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6; padding: 32px 20px 64px; }
  .wrap { max-width: 1200px; margin: 0 auto; }
  h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.3px; }
  .sub { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
  .live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ccc; margin-left: 6px; vertical-align: middle; }
  .live-dot.on { background: #1d9e75; }
  .meta-bar { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin: 20px 0 28px;
    padding: 14px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; font-size: 14px; }
  .meta-bar label { color: var(--text-muted); }
  .meta-bar input { border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; font-size: 14px; font-family: inherit; width: 160px; }
  .meta-bar input:focus { outline: none; border-color: var(--accent); }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; transition: border-color 0.15s, transform 0.15s; }
  .card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
  .card.lead { border: 2px solid var(--accent); }
  .imgwrap { position: relative; }
  .imgwrap > img { width: 100%; display: block; aspect-ratio: 3/4; object-fit: cover; cursor: zoom-in; }
  .img-tag { position: absolute; top: 8px; right: 8px; z-index: 2; background: rgba(0,0,0,0.55); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 12px; }
  .rank-badge { position: absolute; top: 10px; left: 10px; background: var(--accent); color: #fff; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px; z-index: 2; }
  .gallery-overlay { position: absolute; bottom: 8px; left: 8px; z-index: 2; background: rgba(0,0,0,0.6); color: #fff; font-size: 12px; padding: 4px 10px; border-radius: 12px; pointer-events: none; }
  .thumb-row { display: flex; gap: 6px; padding: 8px 8px 0; }
  .thumb { flex: 1; width: 0; aspect-ratio: 3/4; object-fit: cover; border-radius: 8px; cursor: zoom-in; border: 1px solid var(--border); transition: border-color 0.12s; }
  .thumb:hover { border-color: var(--accent); }
  .card-body { padding: 14px 16px; }
  .label { font-size: 15px; font-weight: 600; }
  .desc { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .soul-id { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-family: monospace; }
  .vote-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
  .vote-btn { flex: 1; border: 1px solid var(--border); background: transparent; border-radius: 8px; padding: 8px; font-size: 13px; font-family: inherit; cursor: pointer; color: var(--text); transition: all 0.12s; font-weight: 500; }
  .vote-btn:hover { border-color: var(--accent); color: var(--accent); }
  .vote-btn.voted { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
  .count { font-size: 18px; font-weight: 700; min-width: 28px; text-align: center; }
  .voters { font-size: 12px; color: var(--text-muted); margin-top: 8px; min-height: 16px; }
  .comment-area { margin-top: 12px; }
  .comment-area textarea { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 38px; }
  .comment-area textarea:focus { outline: none; border-color: var(--accent); }
  .comments { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
  .comment { font-size: 13px; background: var(--bg); border-radius: 8px; padding: 6px 10px; }
  .comment b { color: var(--info); font-weight: 600; }
  .toolbar { display: flex; gap: 10px; margin-top: 28px; flex-wrap: wrap; }
  .toolbar button { border: 1px solid var(--border); background: var(--surface); border-radius: 8px; padding: 9px 16px; font-size: 14px; font-family: inherit; cursor: pointer; color: var(--text); }
  .toolbar button:hover { border-color: var(--border-hover); }
  .banner { background: #fff4e5; border: 1px solid #f0c674; border-radius: 10px; padding: 14px 18px; font-size: 14px; margin-bottom: 24px; color: #7a4f00; }
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 40px; cursor: zoom-out; flex-direction: column; gap: 14px; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 78vh; border-radius: 8px; }
  .lb-caption { color: #fff; font-size: 14px; text-align: center; }
  .lb-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.15); color: #fff; border: none; width: 48px; height: 48px; border-radius: 50%; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .lb-nav:hover { background: rgba(255,255,255,0.3); }
  .lb-prev { left: 24px; }
  .lb-next { right: 24px; }
  .lb-dots { display: flex; gap: 8px; justify-content: center; }
  .lb-dot { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,0.4); cursor: pointer; }
  .lb-dot.active { background: #fff; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>가발 AI 모델 리뷰 <span class="live-dot" id="livedot"></span></h1>
    <p class="sub">Higgsfield Soul 2.0 학습 모델 5종 · 3040 한국 여성 · 캐주얼샷 2종(실내·야외) · 실시간 동기화</p>
  </header>

  <div class="banner" id="cfg-banner" style="display:none;">
    ⚠️ Supabase 설정이 필요합니다.
  </div>

  <div class="meta-bar">
    <label>이름</label>
    <input id="name" type="text" placeholder="팀원 이름 입력" />
    <span style="color:var(--text-muted); font-size:13px;">이름 입력 후 투표·코멘트가 모두에게 실시간 반영됩니다.</span>
  </div>

  <div class="grid" id="grid"></div>

  <div class="toolbar">
    <button onclick="exportResults()">결과 내보내기 (텍스트 복사)</button>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="if(event.target===this)closeGallery()">
  <button class="lb-nav lb-prev" onclick="event.stopPropagation();galleryStep(-1)">‹</button>
  <img id="lightbox-img" src="" alt="" />
  <div class="lb-caption" id="lb-caption"></div>
  <div class="lb-dots" id="lb-dots"></div>
  <button class="lb-nav lb-next" onclick="event.stopPropagation();galleryStep(1)">›</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // 기존 BNH Supabase 프로젝트 — 새 프로젝트로 옮길 때만 교체.
  const SUPABASE_URL = "https://zilgveexykjkwezyhjyb.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_8EybphDKDxUA4l7j0pawgA__p2I9z4L";

  // BNH 최종 Soul 2.0 학습 모델 5종 (2026-06-22 확정) — 실제 데이터로 채움.
  const CDN = 'https://d2ol7oe51mr4n9.cloudfront.net/user_3FKrjo0I8OJSjlwA4fOVjJdyR46/';
  const GEN = 'https://d8j0ntlcm91z4.cloudfront.net/user_3FKrjo0I8OJSjlwA4fOVjJdyR46/';
  const MODELS = [
    { id: 'M1', label: 'M1 — 둥근·밝고 친근', desc: '30대 중반 · 한국 여성',
      soul: '14915dbe-5d69-4c79-b397-b5ce10f9abbe',
      img: GEN + 'hf_20260622_050205_4a4077d9-0eff-4b6b-a2dd-7e67ad764230.png',
      casual: [GEN + 'hf_20260624_052624_40a65e30-af69-4d3a-b3ea-b3dd1daf593f.png', GEN + 'hf_20260624_041243_7c32192f-5867-4181-a59b-3b27b9b6ffe2.png'] },
    { id: 'M2', label: 'M2 — 하트형·부드러운', desc: '30대 후반 · 한국 여성',
      soul: '5eaefb4e-a810-4a48-b37b-9e246acfd2e9',
      img: GEN + 'hf_20260624_023356_60a93c41-d61d-42ef-a218-edf121f52d7b.png',
      casual: [GEN + 'hf_20260624_061554_2ea62b2d-c512-4ce7-93d1-026fa7300d21.png', GEN + 'hf_20260624_070403_4c04a386-4544-46b4-b58b-66e8890ea05c.png'] },
    { id: 'M3', label: 'M3 — 시크·모던', desc: '30대 후반 · 한국 여성',
      soul: '26f82925-4135-4f0d-85a6-54aeda849dee',
      img: CDN + '07a37efe-bbd4-47d6-be32-144271b28e40.png',
      casual: [GEN + 'hf_20260624_083011_e18e6471-fb8b-423e-b408-27e3b2b57e2c.png', GEN + 'hf_20260624_052633_b1676e7b-2962-4d30-a318-8d46f37f27b6.png'] },
    { id: 'M4', label: 'M4 — 따뜻·자연스러운', desc: '30대 후반 · 한국 여성',
      soul: 'aa1248d3-51df-443f-a9d2-e5fec457f25b',
      img: CDN + '11f6138f-577e-49c4-9276-e3e078c95a60.png',
      casual: [GEN + 'hf_20260624_054923_2e1428b3-c2aa-41a8-a322-684cb9678747.png', GEN + 'hf_20260624_092641_d1083dd3-e651-4949-ae2b-c30a60de89b3.png'] },
    { id: 'M5', label: 'M5 — 화사·생기', desc: '40대 초반 · 한국 여성',
      soul: 'ae8444f8-445d-4d9b-ba5f-faa8ec451145',
      img: GEN + 'hf_20260622_023458_f61f81ff-81b7-4c82-a5a5-e24805fa93bd.png',
      casual: [GEN + 'hf_20260624_054950_ef28d39d-0559-469b-8883-7410f5d8263f.png', GEN + 'hf_20260624_060549_43c04897-e85f-45ac-b7a4-67accd768785.png'] },
  ];

  const configured = SUPABASE_URL.startsWith('http') && SUPABASE_ANON_KEY.length > 20;
  let votes = [];
  let comments = [];
  let sb = null;

  if (!configured) {
    document.getElementById('cfg-banner').style.display = 'block';
  } else {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    initLive();
  }

  function myName() { return (document.getElementById('name').value || '').trim(); }
  function localKey() { return 'bnh_name'; }

  async function loadAll() {
    const [v, c] = await Promise.all([
      sb.from('wig_votes').select('model_id,voter_name'),
      sb.from('wig_comments').select('model_id,author,body').order('created_at', { ascending: true }),
    ]);
    votes = v.data || [];
    comments = c.data || [];
    render();
  }

  async function initLive() {
    await loadAll();
    sb.channel('wig-review')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'wig_votes' }, loadAll)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'wig_comments' }, loadAll)
      .subscribe(status => {
        document.getElementById('livedot').classList.toggle('on', status === 'SUBSCRIBED');
      });
  }

  async function toggleVote(id) {
    const name = myName();
    if (!name) { alert('먼저 이름을 입력해주세요.'); return; }
    const mine = votes.find(v => v.model_id === id && v.voter_name === name);
    if (mine) {
      await sb.from('wig_votes').delete().eq('model_id', id).eq('voter_name', name);
    } else {
      await sb.from('wig_votes').insert({ model_id: id, voter_name: name });
    }
    loadAll();
  }

  async function addComment(id) {
    const name = myName();
    if (!name) { alert('먼저 이름을 입력해주세요.'); return; }
    const ta = document.getElementById('c-' + id);
    const body = ta.value.trim();
    if (!body) return;
    ta.value = '';
    await sb.from('wig_comments').insert({ model_id: id, author: name, body });
    loadAll();
  }

  let gallery = { items: [], idx: 0, label: '' };

  function openGallery(modelId, startIdx) {
    const m = MODELS.find(x => x.id === modelId);
    if (!m) return;
    const profile = { src: m.img, tag: '스튜디오 프로필' };
    const casuals = (m.casual || []).map((src, i) => ({ src, tag: `캐주얼 일상 샷 ${i + 1}` }));
    gallery = { items: [profile, ...casuals], idx: startIdx || 0, label: m.label };
    renderGallery();
    document.getElementById('lightbox').classList.add('open');
  }

  function renderGallery() {
    const cur = gallery.items[gallery.idx];
    document.getElementById('lightbox-img').src = cur.src;
    document.getElementById('lb-caption').textContent = `${gallery.label} · ${cur.tag} (${gallery.idx + 1}/${gallery.items.length})`;
    document.getElementById('lb-dots').innerHTML = gallery.items
      .map((_, i) => `<div class="lb-dot ${i === gallery.idx ? 'active' : ''}" onclick="event.stopPropagation();galleryGo(${i})"></div>`).join('');
  }

  function galleryStep(d) {
    gallery.idx = (gallery.idx + d + gallery.items.length) % gallery.items.length;
    renderGallery();
  }
  function galleryGo(i) { gallery.idx = i; renderGallery(); }
  function closeGallery() { document.getElementById('lightbox').classList.remove('open'); }

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'ArrowLeft') galleryStep(-1);
    else if (e.key === 'ArrowRight') galleryStep(1);
    else if (e.key === 'Escape') closeGallery();
  });

  function render() {
    const counts = {};
    MODELS.forEach(m => counts[m.id] = votes.filter(v => v.model_id === m.id));
    const max = Math.max(1, ...MODELS.map(m => counts[m.id].length));
    const name = myName();
    document.getElementById('grid').innerHTML = MODELS.map(m => {
      const vs = counts[m.id];
      const cs = comments.filter(c => c.model_id === m.id);
      const isLead = vs.length === max && max > 0 && votes.length > 0;
      const voted = vs.some(v => v.voter_name === name);
      return `
      <div class="card ${isLead ? 'lead' : ''}">
        <div class="imgwrap">
          ${isLead ? '<span class="rank-badge">최다 득표</span>' : ''}
          <span class="img-tag">Soul 학습 완료</span>
          ${m.casual && m.casual.length ? `<span class="gallery-overlay">📷 프로필 + 캐주얼 ${m.casual.length}장 · 클릭</span>` : ''}
          <img src="${m.img}" alt="${m.label}" onclick="openGallery('${m.id}', 0)" />
        </div>
        ${m.casual && m.casual.length ? `<div class="thumb-row">
          ${m.casual.map((src, i) => `<img class="thumb" src="${src}" alt="캐주얼 ${i+1}" onclick="openGallery('${m.id}', ${i+1})" />`).join('')}
        </div>` : ''}
        <div class="card-body">
          <div class="label">${m.label}</div>
          <div class="desc">${m.desc}</div>
          <div class="soul-id">${m.soul ? 'soul: ' + m.soul.slice(0,8) : ''}</div>
          <div class="vote-row">
            <button class="vote-btn ${voted ? 'voted' : ''}" onclick="toggleVote('${m.id}')">${voted ? '✓ 투표함' : '👍 투표'}</button>
            <span class="count">${vs.length}</span>
          </div>
          <div class="voters">${vs.length ? '투표: ' + vs.map(v => v.voter_name).join(', ') : ''}</div>
          <div class="comment-area">
            <textarea id="c-${m.id}" placeholder="코멘트 입력 후 Enter" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();addComment('${m.id}')}"></textarea>
            <div class="comments">${cs.map(c => `<div class="comment"><b>${c.author}</b> ${escapeHtml(c.body)}</div>`).join('')}</div>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function escapeHtml(s) { return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

  function exportResults() {
    let out = '가발 AI 모델 리뷰 결과\n\n';
    MODELS.forEach(m => {
      const vs = votes.filter(v => v.model_id === m.id);
      const cs = comments.filter(c => c.model_id === m.id);
      out += `[${m.label}] 득표 ${vs.length}표 (${vs.map(v=>v.voter_name).join(', ') || '-'})\n`;
      cs.forEach(c => out += `  · ${c.author}: ${c.body}\n`);
      out += '\n';
    });
    navigator.clipboard.writeText(out).then(() => alert('결과가 클립보드에 복사되었습니다.'));
  }

  const nameInput = document.getElementById('name');
  nameInput.value = localStorage.getItem(localKey()) || '';
  nameInput.addEventListener('input', () => { localStorage.setItem(localKey(), nameInput.value); render(); });
  render();
</script>
</body>
</html>
